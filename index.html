<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arsevus</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            font-family:Arial, Helvetica, sans-serif;
            background:#111;
            color:#f5f5f5;
            display:flex;
            justify-content:center;
            align-items:center;
            min-height:100vh;
            text-align:center;
            padding:2rem;
        }

        main{
            max-width:700px;
        }

        h1{
            font-size:4rem;
            letter-spacing:4px;
            margin-bottom:1rem;
        }

        p{
            color:#bdbdbd;
            line-height:1.7;
            margin-bottom:2rem;
        }

        a{
            display:inline-block;
            text-decoration:none;
            color:white;
            border:2px solid white;
            padding:.8rem 1.8rem;
            transition:.2s;
        }

        a:hover{
            background:white;
            color:#111;
        }

        footer{
            margin-top:4rem;
            color:#777;
            font-size:.9rem;
        }
    </style>
</head>
<body>

    <main>

        <h1>ARSEVUS</h1>

        <p>
            Creamos videojuegos con pasión por la fantasía, la exploración
            y las historias que dejan huella.
        </p>

        <a href="#">Próximamente</a>

        <footer>
            © 2026 Arsevus. Todos los derechos reservados.
        </footer>

    </main>

</body>
</html>
